# DigitalOcean App Platform Functions — IamLogic lead-form backend.
# Deployed as a separate Functions component alongside the static site (the
# site itself stays build-free — this is the one intentional exception, see
# CLAUDE.md "Lead forms" section).
#
# Verifies Cloudflare Turnstile, then forwards the lead server-side to Zoho
# CRM's Web-to-Lead endpoint (so the Zoho form tokens never reach the browser).
#
# Required env (App Platform → this component → Settings → App-Level
# Environment Variables, scope RUN_TIME, type SECRET):
#   TURNSTILE_SECRET   Cloudflare Turnstile secret key (paired with the site
#                      key hard-coded in assets/main.js). For initial testing
#                      (before you have a real Cloudflare Turnstile site),
#                      use Cloudflare's documented dummy "always passes"
#                      secret: 1x0000000000000000000000000000000AA — pairs
#                      with the dummy site key already in assets/main.js.
#                      Replace both with your real keys before going live.
#
# Endpoint (with the functions component routed at /api):
#   POST /api/forms/lead
environment:
  TURNSTILE_SECRET: ${TURNSTILE_SECRET}
packages:
  - name: forms
    actions:
      - name: lead
        runtime: 'nodejs:18'
        web: true
        limits:
          timeout: 10000
          memory: 256
